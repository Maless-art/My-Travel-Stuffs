<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563EB">
<link rel="icon" href="icons/icon-192.png">
<title>My Travel Stuff</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#fff;
  color:#111;
}

.hidden{
  display:none !important;
}

.center{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}

.logo{
  width:180px;
  margin-bottom:20px;
}

.progress{
  width:200px;
  height:6px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
  margin:20px 0;
}

.progress div{
  height:100%;
  width:0%;
  background:#2563EB;
  transition:2.5s;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  font-size:16px;
}

.primary{
  background:#2563EB;
  color:#fff;
}

.secondary{
  background:#eee;
}

.footer{
  position:absolute;
  bottom:20px;
  font-size:12px;
  color:#888;
}

/* APP */

.header{
  text-align:center;
  padding:15px;
  font-weight:bold;
}

.tabs{
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.tab{
  padding:10px;
  border-radius:8px;
  background:#eee;
}

.active{
  background:#2563EB;
  color:#fff;
}

.section{
  padding:10px 20px;
}

.item{
  display:flex;
  align-items:center;
  padding:8px 0;
}

.item input{
  margin-right:10px;
  transform:scale(1.2);
}

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  padding:10px;
  background:#fff;
  border-top:1px solid #eee;
}

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal.show{
  display:flex;
}
.modal-content{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:80%;
}
.tab{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:5px;
  padding:10px;
  border-radius:10px;
  background:#eee;
  font-size:20px;
}

.tab span{
  font-size:12px;
}

.active{
  background:#2563EB;
  color:#fff;
}

#list{
  padding-bottom:80px;
}
.hidden{display:none !important;}

#list{
  padding-bottom:90px;
}

.item{
  display:flex;
  align-items:center;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.item:hover{
  background:#f3f4f6;
}
.progress-box{
  padding:10px 20px 0;
}

.progress-text{
  font-size:14px;
  margin-bottom:6px;
  font-weight:bold;
}

.progress-line{
  width:100%;
  height:8px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
}

#progressFill{
  width:0%;
  height:100%;
  background:#2563EB;
  border-radius:999px;
  transition:width .25s ease;
}

.item{
  display:flex;
  align-items:center;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  transition:background .2s ease, transform .15s ease;
}

.item:hover{
  background:#f3f4f6;
}

.item.checked{
  background:#eef4ff;
  transform:scale(0.98);
}

.item span{
  transition:all .2s ease;
}


</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="center">
  <img src="logo.png" class="logo">
  <h2>My Travel Stuff</h2>
  <p>Tu equipaje bajo control</p>

  <div class="progress"><div id="bar"></div></div>

  <button id="openBtn" class="primary hidden" onclick="abrirMaleta()">Abrir maleta</button>

  <div class="footer">Developed by Franklin Black  v1.0.1</div>
</div>

<!-- PERFIL -->
<div id="perfil" class="center hidden">
  <h2>Selecciona perfil</h2>
  <button class="primary" onclick="setPerfil('hombre')">👨 Hombre</button>
  <br><br>
  <button class="primary" onclick="setPerfil('mujer')">👩 Mujer</button>

</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="header">My Travel Stuff</div>

   <div class="tabs">
  <div class="tab active" onclick="setViaje('corto', this)">
    🚗
    <span>Viaje corto</span>
  </div>

  <div class="tab" onclick="setViaje('largo', this)">
    ✈️
    <span>Viaje largo</span>
  </div>

  <div class="tab" onclick="setViaje('comercial', this)">
    💼
    <span>Viaje comercial</span>
  </div>
</div>
<div id="progressBox" class="progress-box">
  <div class="progress-text">
    Progreso: <span id="progressText">0/0</span>
  </div>
  <div class="progress-line">
    <div id="progressFill"></div>
  </div>
</div>
  <div id="list"></div>

  <div class="bottom">
<button class="secondary" onclick="nuevoViaje()">Nuevo viaje</button>
    <button class="primary" style="width:100%" onclick="confirmar()">Listo para el viaje</button>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3>¿Estás seguro de que estás listo?</h3>
    <div id="faltantes"></div>
    <br>
    <button class="primary" onclick="finalizar()">Sí, estoy listo</button>
    <br><br>
    <button class="secondary" onclick="closeModal()">Uff, lo estaba olvidando</button>
<button id="openBtn" class="primary hidden" onclick="abrirMaleta()">Abrir maleta</button> 
 </div>
</div>

<script>
let perfil = localStorage.getItem("perfil") || "hombre";
let viaje = localStorage.getItem("viaje") || "corto";
let checksGuardados = JSON.parse(localStorage.getItem("checks")) || {};
// SPLASH
setTimeout(()=>{
  document.getElementById("bar").style.width="100%";
},100);

setTimeout(()=>{
  document.getElementById("openBtn").classList.remove("hidden");
},2500);


// DATA

const items=[
{name:"Camisas",cat:"Ropa",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Pantalones",cat:"Ropa",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Correa",cat:"Ropa",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Faldas",cat:"Ropa",perfil:["mujer"],viaje:["corto","largo","comercial"]},
{name:"Boxers",cat:"Ropa",perfil:["hombre"],viaje:["corto","largo","comercial"]},
{name:"Sostén",cat:"Ropa",perfil:["mujer"],viaje:["corto","largo","comercial"]},
{name:"Franelas",cat:"Ropa",perfil:["hombre"],viaje:["corto","largo","comercial"]},
{name:"Medias",cat:"Ropa",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Panties",cat:"Ropa",perfil:["mujer"],viaje:["corto","largo","comercial"]},
{name:"Pañuelos",cat:"Ropa",perfil:["hombre"],viaje:["corto","largo","comercial"]},
{name:"Pijamas",cat:"Ropa",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Zapatos",cat:"Ropa",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Zapatillas",cat:"Ropa",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Chancletas",cat:"Ropa",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Relojes",cat:"Ropa",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Joyas",cat:"Ropa",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Abrigo",cat:"Ropa",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Lentes",cat:"Ropa",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Cepillo de dientes",cat:"Higiene",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Crema dental",cat:"Higiene",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Hilo dental",cat:"Higiene",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Enjuague bucal",cat:"Higiene",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Desodorante",cat:"Higiene",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Perfumes",cat:"Higiene",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Gel",cat:"Higiene",perfil:["hombre"],viaje:["corto","largo","comercial"]},
{name:"Toallas sanitarias",cat:"Higiene",perfil:["mujer"],viaje:["corto","largo","comercial"]},
{name:"Cremas corporales",cat:"Higiene",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Crema de peinar",cat:"Higiene",perfil:["mujer"],viaje:["corto","largo","comercial"]},
{name:"Cepillo de peinar",cat:"Higiene",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Maquillaje",cat:"Higiene",perfil:["mujer"],viaje:["corto","largo","comercial"]},
{name:"Desmaquillante",cat:"Higiene",perfil:["mujer"],viaje:["corto","largo","comercial"]},
{name:"Protector Solar",cat:"Higiene",perfil:["mujer"],viaje:["corto","largo","comercial"]},
{name:"Medicamentos",cat:"Higiene",perfil:["mujer"],viaje:["corto","largo","comercial"]},
{name:"Cargador",cat:"Tecnología",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Audífonos",cat:"Tecnología",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Cámara",cat:"Tecnología",perfil:["hombre","mujer"],viaje:["largo","comercial"]},
{name:"Accesorios de cámara",cat:"Tecnología",perfil:["hombre","mujer"],viaje:["largo","comercial"]},
{name:"Tablet",cat:"Tecnología",perfil:["hombre","mujer"],viaje:["largo","comercial"]},
{name:"Laptop",cat:"Tecnología",perfil:["hombre","mujer"],viaje:["comercial"]},
{name:"Cargador",cat:"Tecnología",perfil:["hombre","mujer"],viaje:["corto","largo","comercial"]},
{name:"Pasaporte",cat:"Documentos",perfil:["hombre","mujer"],viaje:["largo","comercial"]},
{name:"Boletos",cat:"Documentos",perfil:["hombre","mujer"],viaje:["largo","comercial"]},
{name:"Permisos",cat:"Documentos",perfil:["hombre","mujer"],viaje:["largo","comercial"]},
{name:"Docs. Varios",cat:"Documentos",perfil:["hombre","mujer"],viaje:["largo","comercial"]}
];

// PERFIL
function setPerfil(p){
  perfil = p;
  localStorage.setItem("perfil", perfil);

  document.getElementById("perfil").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  render();
}
function abrirMaleta(){
  document.getElementById("splash").classList.add("hidden");
  document.getElementById("app").classList.add("hidden");
  document.getElementById("perfil").classList.remove("hidden");
}

// VIAJE
function setViaje(v, el){
  viaje = v;
  localStorage.setItem("viaje", viaje);

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  render();
}
function nuevoViaje(){
  checksGuardados = {};
  localStorage.removeItem("checks");
  localStorage.removeItem("perfil");

  viaje = "corto";
  localStorage.setItem("viaje", viaje);

  document.getElementById("app").classList.add("hidden");
  document.getElementById("perfil").classList.remove("hidden");
}
// RENDER
function render(){
  let html = "";
  let grouped = {};

  items.forEach(i => {
    if(i.perfil.includes(perfil) && i.viaje.includes(viaje)){
      if(!grouped[i.cat]) grouped[i.cat] = [];
      grouped[i.cat].push(i);
    }
  });

  for(let cat in grouped){
    html += `<div class="section"><h3>${cat}</h3>`;
    grouped[cat].forEach(i => {
      const checked = checksGuardados[i.name] ? "checked" : "";
      const checkedClass = checksGuardados[i.name] ? "checked" : "";
      html += `
      <label class="item ${checkedClass}">
        <input type="checkbox" data-name="${i.name}" ${checked}>
        <span>${i.name}</span>
      </label>`;
    });
    html += `</div>`;
  }

  document.getElementById("list").innerHTML = html;

  document.querySelectorAll('#list input[type="checkbox"]').forEach(ch => {
    ch.addEventListener("change", function(){
      checksGuardados[this.dataset.name] = this.checked;
      localStorage.setItem("checks", JSON.stringify(checksGuardados));

      const item = this.closest(".item");
      if(this.checked){
        item.classList.add("checked");
        playCheckSound();
      } else {
        item.classList.remove("checked");
      }

      updateProgress();
    });
  });

  updateProgress();
}
function playCheckSound(){
  const audio = new Audio("data:audio/wav;base64,UklGRlQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YTAAAAAA/////wAAAP//AAD//wAA//8AAP//AAD//wAA");
  audio.volume = 0.15;
  audio.play().catch(()=>{});
} 
function updateProgress(){
  const checks = document.querySelectorAll('#list input[type="checkbox"]');
  const total = checks.length;
  const done = [...checks].filter(c => c.checked).length;
  const percent = total ? (done / total) * 100 : 0;

  document.getElementById("progressText").textContent = `${done}/${total}`;
  document.getElementById("progressFill").style.width = `${percent}%`;
}
// CONFIRMAR
function confirmar(){
  const checks=document.querySelectorAll("input[type=checkbox]");
  let faltan=[];

  checks.forEach(c=>{
    if(!c.checked) faltan.push(c.dataset.name);
  });

  if(faltan.length===0){
    finalizar();
    return;
  }

  document.getElementById("faltantes").innerHTML=
    "Te faltó empacar:<br>"+faltan.join("<br>");

  document.getElementById("modal").classList.remove("hidden");
}

function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}

function finalizar(){
  document.getElementById("modal").classList.add("hidden");
  alert("✅ Listo, equipaje listo!\nQue tengas un excelente viaje,\nque vayas y regreses con bien a casa.");
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", async () => {
    try {
      await navigator.serviceWorker.register("./sw.js");
      console.log("SW registrado");
    } catch (e) {
      console.log("Error registrando SW", e);
    }
  });
}

</script>

</body>
</html>
